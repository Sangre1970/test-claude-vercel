    .butoane-stanga {
      position: fixed;
      top: 40px;
      left: 30px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 10;
    }

    button {
      cursor: pointer;
      padding: 12px 28px;
      font-size: 1rem;
      font-family: Georgia, serif;
      border: 2px solid #cc0000;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      letter-spacing: 1px;
      box-shadow: 0 0 10px rgba(200,0,0,0.5);
      transition: background 0.2s, box-shadow 0.2s;
    }
    button:hover {
      background: rgba(160, 0, 0, 0.88);
      box-shadow: 0 0 20px rgba(255,0,0,0.7);
    }

    #btn-ghici {
      position: fixed;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      padding: 24px 12px;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 4px;
      color: #ff6666;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid #cc0000;
      z-index: 10;
    }
    #btn-ghici:hover { background: rgba(120, 0, 0, 0.92); }

    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    #overlay.activ { display: flex; }

    #mesaj {
      background: linear-gradient(135deg, #1a0000, #3a0000);
      border: 2px solid #cc0000;
      padding: 50px 70px;
      border-radius: 16px;
      font-size: 1.6rem;
      color: #fff;
      text-align: center;
      box-shadow: 0 0 40px rgba(200,0,0,0.6), 0 8px 30px rgba(0,0,0,0.8);
      text-shadow: 0 0 10px #cc0000;
    }
    #mesaj button {
      margin-top: 24px;
      display: block;
      width: 100%;
      font-size: 0.95rem;
      letter-spacing: 2px;
    }

    #mesaj-jos {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(90deg, #000 0%, #1a0000 40%, #000 100%);
      color: #ff4444;
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
      padding: 22px 0;
      letter-spacing: 4px;
      border-top: 3px solid #cc0000;
      box-shadow: 0 -4px 20px rgba(200,0,0,0.5);
      text-shadow: 0 0 14px #ff0000, 0 0 30px #aa0000;
      z-index: 200;
      cursor: pointer;
    }
    #mesaj-jos.activ { display: block; }
  </style>
</head>
<body>

  <div class="butoane-stanga">
    <button onclick="alert('Ai apasat butonul!')">Apasa-ma</button>
    <button onclick="document.getElementById('overlay').classList.add('activ')">Salut Gigi</button>
  </div>

  <button id="btn-ghici" onclick="document.getElementById('mesaj-jos').classList.add('activ')">Ghici</button>

  <div id="overlay">
    <div id="mesaj">
      Bine ai venit Gigi!
      <button onclick="document.getElementById('overlay').classList.remove('activ')">Inchide</button>
    </div>
  </div>

  <div id="mesaj-jos" onclick="this.classList.remove('activ')">
    ✦ &nbsp; eu sunt Claude Code &nbsp; ✦ &nbsp;&nbsp;&nbsp; (click pentru a inchide)
  </div>

</body>
</html>
